<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnikin Match - Kin-Ball Tactics Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f12; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; padding: 10px; }
        
        /* CORRECTION : Suppression des hauteurs fixes pour éviter la coupure d'écran */
        #game-container { width: 100%; max-width: 450px; min-height: 800px; background-color: #1a1a1f; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 16px; border: 1px solid #2d2d35; padding-bottom: 10px; }
        
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111115; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; z-index: 10; text-align: center; border-radius: 16px; }
        h1 { margin-bottom: 5px; color: #ffd43b; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 14px; opacity: 0.7; margin-bottom: 30px; font-weight: normal; }
        .team-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s; color: white; }
        .team-btn:hover { transform: scale(1.02); }
        .btn-bleu { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .btn-gris { background: linear-gradient(135deg, #374151, #6b7280); }
        .btn-noir { background: linear-gradient(135deg, #0f172a, #1e293b); border: 1px solid #475569; }

        #header { padding: 12px; background: #111114; text-align: center; border-bottom: 2px solid #2a2a35; flex-shrink: 0; }
        #scores { font-size: 13px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; color: #a5a5b0; }
        #energie { font-size: 18px; color: #ffd43b; font-weight: bold; }
        
        #tactical-bar { display: flex; justify-content: space-between; padding: 6px 12px; background: #16161c; font-size: 11px; border-bottom: 1px solid #2d2d35; }
        .badge { padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-turn { background: #2d2d35; color: #fff; }
        
        /* CORRECTION : Zone centrale adaptative (min-height au lieu de flex:1 bloqué) */
        #log-zone { min-height: 180px; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-size: 14px; color: #e2e2e9; line-height: 1.5; background: radial-gradient(circle, #22222a 0%, #141418 100%); border-bottom: 1px solid #2d2d35; }
        
        #tactical-actions { display: flex; gap: 6px; margin-bottom: 12px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .action-tac-btn { background: #272730; color: #fff; border: 1px solid #3d3d4a; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .action-tac-btn.selected-action { background: #ffd43b; color: #111; border-color: #fff; }
        .action-tac-btn:hover { border-color: #ffd43b; }

        #btn-continuer { display: none; margin-top: 12px; background: #ffd43b; color: #111; border: none; padding: 10px 25px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255,212,59,0.2); }

        .loader { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #111; margin-left: 5px; animation: loader-anim 1s infinite alternate; }
        @keyframes loader-anim { from { opacity: 0.2; } to { opacity: 1; } }

        /* EFFECTIF STYLE FIFA */
        #roster-label { text-align: center; font-size: 11px; font-weight: bold; color: #ffd43b; text-transform: uppercase; background: #111114; padding: 5px 0; border-top: 2px solid #2a2a35; }
        #roster-container { display: flex; justify-content: space-between; background: #111114; padding: 8px; gap: 4px; border-bottom: 2px solid #2a2a35; }
        
        .fifa-card { width: 24%; background: linear-gradient(135deg, #252014 0%, #12100b 100%); border: 1px solid #ccab26; border-radius: 6px; padding: 5px 3px; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 3px 6px rgba(0,0,0,0.5); transition: 0.2s; color: #fff; cursor: pointer; }
        .fifa-card.active-defender { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .fifa-card.selected { background: linear-gradient(135deg, #ffd43b 0%, #b59210 100%); border-color: #fff; color: #111; }
        .fifa-card.selected .stat-value { color: #111; }
        .fifa-card.selected .player-role { background: rgba(0,0,0,0.15); color: #000; }
        .fifa-card.disabled-select { cursor: not-allowed; opacity: 0.5; }
        
        .player-rating { font-size: 13px; font-weight: 900; font-family: 'Impact', sans-serif; line-height: 1; }
        .player-name { font-size: 10px; font-weight: bold; text-transform: uppercase; margin: 2px 0; text-align: center; overflow: hidden; width: 100%; text-overflow: ellipsis; }
        .player-role { font-size: 7px; text-transform: uppercase; background: rgba(255,212,59,0.15); color: #ffd43b; padding: 1px 3px; border-radius: 3px; font-weight: bold; margin-bottom: 4px; }
        
        .fatigue-bar-container { width: 90%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 4px; overflow: hidden; }
        .fatigue-bar { height: 100%; background: #4cdf4c; width: 100%; transition: width 0.3s; }

        .player-stats { width: 100%; display: flex; flex-direction: column; gap: 1px; font-size: 8px; border-top: 1px solid rgba(255,212,59,0.2); padding-top: 3px; }
        .player-stat-row { display: flex; justify-content: space-between; width: 100%; padding: 0 1px; }
        .stat-label { opacity: 0.6; font-size: 7px; }
        .stat-value { font-weight: bold; color: #ffd43b; }

        /* CARTES D'ACTION TACTIQUE */
        #cards-label { text-align: center; font-size: 11px; font-weight: bold; color: #a5a5b0; text-transform: uppercase; background: #141418; padding: 5px 0; }
        #cards-container { min-height: 145px; display: flex; justify-content: space-around; align-items: center; padding: 8px; background-color: #141418; flex-shrink: 0; gap: 6px; flex-wrap: wrap; }
        
        .card { width: 32%; min-height: 125px; border-radius: 8px; border: none; display: flex; flex-direction: column; justify-content: space-between; padding: 8px 4px; cursor: pointer; text-align: center; font-weight: bold; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.4); color: white; }
        .card:disabled { opacity: 0.15; cursor: not-allowed; transform: none !important; }
        
        .card.attaque { background: linear-gradient(135deg, #dc2626, #7f1d1d); border: 1px solid #ef4444; }
        .card.defense { background: linear-gradient(135deg, #2563eb, #1e3a8a); border: 1px solid #3b82f6; }
        
        .card-title { font-size: 11px; text-transform: uppercase; height: 26px; overflow: hidden; }
        .card-cost { font-size: 11px; color: #ffd43b; background: rgba(0,0,0,0.4); padding: 1px; border-radius: 4px; width: 90%; margin: 0 auto; }
        .card-desc { font-size: 9px; font-weight: normal; opacity: 0.8; height: 32px; overflow: hidden; line-height: 1.2; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1>OMNIKIN !</h1>
        <h2>Tactics Manager Vol.3</h2>
        <button class="team-btn btn-bleu" onclick="choisirEquipe('BLEU')">BLEU</button>
        <button class="team-btn btn-gris" onclick="choisirEquipe('GRIS')">GRIS</button>
        <button class="team-btn btn-noir" onclick="choisirEquipe('NOIR')">NOIR</button>
    </div>

    <div id="header">
        <div id="scores">BLEU: 0 | GRIS: 0 | NOIR: 0</div>
        <div id="energie">⚡ Énergie globale: 1/4</div>
    </div>

    <div id="tactical-bar">
        <div>SITUATION : <span id="badge-turn" class="badge badge-turn">ATTACo</span></div>
        <div></div>
    </div>
    
    <div id="roster-label">Composition de l'Équipe</div>
    <div id="roster-container"></div>
    
    <div id="log-zone">
        <div id="tactical-actions"></div>
        <div id="log-text">Initialisation...</div>
        <button id="btn-continuer" onclick="confirmerContinuer()">Continuer ➔</button>
    </div>

    <div id="cards-label">Options Tactiques</div>
    <div id="cards-container"></div>
</div>

<script>
    const monEquipeJoueurs = {
        "pierre":   { nom: "Pierre",  gen: 84, role: "Buteur",   pui: 90, fei: 55, ana: 62, hau: 80, rap: 60, mob: 55, sou: 45, vit: 65, endurance: 100, 
                      frappes: { "frappe_lourde": {nom: "Frappe Lourde", cout: 2, stat:"pui", desc:"Force brute vers le fond."}, 
                                 "frappe_droite": {nom: "Frappe Droite", cout: 1, stat:"pui", desc:"Coup classique et précis."}, 
                                 "dunk":          {nom: "Dunk Rapproché", cout: 2, stat:"hau", desc:"Frappe plongeante sur leur bloc."} } },
        
        "paul":     { nom: "Paul",    gen: 81, role: "Soutien",  pui: 50, fei: 60, ana: 70, hau: 55, app: 75, rap: 82, mob: 60, sou: 92, vit: 84, endurance: 100,
                      frappes: { "frappe_droite": {nom: "Frappe Droite", cout: 1, stat:"pui", desc:"Placement sécurisé."}, 
                                 "lob":           {nom: "Lob Profond", cout: 1, stat:"hau", desc:"Passe au-dessus d'une défense haute."} } },
        
        "jacques":  { nom: "Jacques", gen: 85, role: "Capitaine",pui: 78, fei: 76, ana: 86, hau: 75, app: 90, rap: 78, mob: 76, sou: 74, vit: 75, endurance: 100,
                      frappes: { "frappe_droite": {nom: "Frappe Droite", cout: 1, stat:"pui", desc:"Assure le coup."}, 
                                 "feinte":        {nom: "Feinte de Corps", cout: 1, stat:"fei", desc:"Feinte l'appel pour ouvrir l'espace."} } },
        
        "couille":  { nom: "Couille", gen: 78, role: "Joker",    pui: 55, fei: 92, ana: 65, hau: 70, app: 60, rap: 65, mob: 92, sou: 80, vit: 88, endurance: 100,
                      frappes: { "frappe_droite": {nom: "Frappe Droite", cout: 1, stat:"pui", desc:"Frappe d'appoint."},
                                 "feinte":        {nom: "Feinte de Corps", cout: 1, stat:"fei", desc:"Esquive agile latérale."}, 
                                 "dunk":          {nom: "Dunk Rapproché", cout: 2, stat:"hau", desc:"Plonge sur la défense serrée."} } }
    };

    const collectifEquipe = { pui: 68, fei: 70, ana: 70, hau: 70, app: 73, rap: 71, mob: 70, sou: 72, vit: 78 };
    const baseEquipeScore = 40; 

    const formationsDefensives = {
        "base": { nom: "Carré de Base", cout: 0, desc: "Standard. Couverture homogène.", dangerContre: "" },
        "rapproche": { nom: "Bloc Rapproché", cout: 1, desc: "Serré au centre. Très exposé si l'IA se déplace.", dangerContre: "feinte" },
        "proche": { nom: "Carré Proche", cout: 1, desc: "Avancé. Bloque le court, vulnérable aux lobs profonds.", dangerContre: "lob" }
    };

    let equipeJoueur = "";
    let joueurSelectionne = ""; 
    let transitionAttaque = "centre"; 
    let joueurDefenseurCible = "";    
    let scores = { "BLEU": 0, "GRIS": 0, "NOIR": 0 };
    let equipesEnJeu = ["BLEU", "GRIS", "NOIR"];
    let energie = 1; 
    let equipeQuiAttaque = "BLEU"; 
    let formationIA = "base";           
    let typeFrappeIA = "";           
    let phasePetiteFinale = false;

    function choisirEquipe(couleur) {
        equipeJoueur = couleur;
        document.getElementById("setup-screen").style.display = "none";
        determinerPhase();
    }

    function genererRosterGraphique(bloque = false) {
        const container = document.getElementById("roster-container");
        container.innerHTML = "";
        let phase = (equipeQuiAttaque === equipeJoueur) ? "attaque" : "defense";
        
        Object.keys(monEquipeJoueurs).forEach(id => {
            let p = monEquipeJoueurs[id];
            let specialClass = "";
            let mouseAction = "";

            if (phase === "attaque" && !bloque) {
                mouseAction = `onclick="changerAttaquant('${id}')"`;
                if (id === joueurSelectionne) specialClass = "selected";
            } else {
                specialClass = "disabled-select";
                if (id === joueurDefenseurCible) specialClass += " active-defender";
            }

            let barColor = "#4cdf4c";
            if (p.endurance < 35) barColor = "#ef4444";
            else if (p.endurance < 60) barColor = "#ff9f43";

            container.innerHTML += `
                <div class="fifa-card ${specialClass}" ${mouseAction}>
                    <div class="player-rating">${p.gen}</div>
                    <div class="player-name">${p.nom}</div>
                    <div class="player-role">${p.role}</div>
                    <div class="fatigue-bar-container">
                        <div class="fatigue-bar" style="width: ${p.endurance}%; background-color: ${barColor}"></div>
                    </div>
                    <div class="player-stats">
                        <div class="player-stat-row"><span class="stat-label">PUI</span><span class="stat-value">${p.pui}</span></div>
                        <div class="player-stat-row"><span class="stat-label">MOB</span><span class="stat-value">${p.mob}</span></div>
                        <div class="player-stat-row"><span class="stat-label">SOU</span><span class="stat-value">${p.sou}</span></div>
                        <div class="player-stat-row"><span class="stat-label">VIT</span><span class="stat-value">${p.vit}</span></div>
                    </div>
                </div>
            `;
        });
    }

    function changerAttaquant(id) {
        if (equipeQuiAttaque === equipeJoueur) {
            joueurSelectionne = id;
            genererRosterGraphique();
            regénérerCartesFrappes();
        }
    }

    function appliquerRecupFatigue(joueurActifId, estAttaque) {
        Object.keys(monEquipeJoueurs).forEach(id => {
            let p = monEquipeJoueurs[id];
            if (id === joueurActifId) {
                p.endurance = Math.max(0, p.endurance - (estAttaque ? 25 : 20));
            } else {
                p.endurance = Math.min(100, p.endurance + 10);
            }
        });
    }

    function determinerPhase() {
        const logText = document.getElementById("log-text");
        const btnContinuer = document.getElementById("btn-continuer");
        const cardsContainer = document.getElementById("cards-container");
        const tacActions = document.getElementById("tactical-actions");

        btnContinuer.style.display = "none";
        cardsContainer.innerHTML = "";
        tacActions.innerHTML = "";
        joueurDefenseurCible = "";
        joueurSelectionne = "";
        transitionAttaque = "centre";

        if (energie < 4) energie += 1;
        actualiserScores();

        if (!equipesEnJeu.includes(equipeJoueur)) {
            let ia1 = equipesEnJeu[0]; let ia2 = equipesEnJeu[1];
            activerPhaseIAvsIA(equipeQuiAttaque === ia1 ? ia2 : ia1);
            return;
        }

        if (equipeQuiAttaque === equipeJoueur) {
            document.getElementById("badge-turn").innerText = "ATTAQUE";
            document.getElementById("badge-turn").style.backgroundColor = "#9b2c2c";
            
            let cibleAuto = determinerCibleReglementaire(equipeJoueur);
            logText.innerHTML = `Votre équipe contrôle le ballon face aux <strong>${cibleAuto}</strong>.<br><br><strong>Étape 1 :</strong> Choisissez le type de transition de votre équipe ci-dessus (Centre, Rapide ou Déplacement).`;
            
            tacActions.innerHTML = `
                <button id="btn-t-centre" class="action-tac-btn selected-action" onclick="choisirTransition('centre')">📍 Jeu au Centre</button>
                <button id="btn-t-rapide" class="action-tac-btn" onclick="choisirTransition('rapide')">⚡ Jeu Rapide (-1⚡)</button>
                <button id="btn-t-deplacement" class="action-tac-btn" onclick="choisirTransition('deplacement')">🔄 Déplacement (-1⚡)</button>
            `;
            
            let formIAKeys = Object.keys(formationsDefensives);
            formationIA = formIAKeys[Math.floor(Math.random() * formIAKeys.length)];

            genererRosterGraphique();
        } 
        else {
            document.getElementById("badge-turn").innerText = "DÉFENSE";
            document.getElementById("badge-turn").style.backgroundColor = "#2b6cb0";
            
            let cibleIA = determinerCibleReglementaire(equipeQuiAttaque);
            if (cibleIA === equipeJoueur) {
                let deIA = Math.random() * 100;
                let transitionIA = "centre";
                if (deIA > 70) transitionIA = "rapide";
                else if (deIA > 45) transitionIA = "deplacement";

                let frappesPossibles = ["frappe_droite", "frappe_lourde", "feinte", "lob"];
                typeFrappeIA = frappesPossibles[Math.floor(Math.random() * frappesPossibles.length)];

                if (transitionIA === "deplacement") {
                    logText.innerHTML = `⚠️ <strong>ALERTE :</strong> L'équipe ${equipeQuiAttaque} amorce un <strong>déplacement coordonné</strong> !<br><br>Sélectionnez votre formation défensive ci-dessous pour couvrir l'espace.`;
                } else if (transitionIA === "rapide") {
                    logText.innerHTML = `⚡ <strong>ALERTE :</strong> Jeu ultra-rapide des ${equipeQuiAttaque} ! Ils tentent de vous prendre de vitesse !`;
                } else {
                    logText.innerHTML = `L'équipe <strong>${equipeQuiAttaque}</strong> construit son jeu au centre. Préparez-vous à l'impact.`;
                }
                
                Object.keys(formationsDefensives).forEach(idForm => {
                    let f = formationsDefensives[idForm];
                    const cardEl = document.createElement("button");
                    cardEl.className = "card defense";
                    cardEl.disabled = energie < f.cout;
                    cardEl.onclick = () => executerDefenseJoueur(idForm, transitionIA);
                    cardEl.innerHTML = `
                        <div class="card-title">${f.nom}</div>
                        <div class="card-cost">⚡ Cout: ${f.cout}</div>
                        <div class="card-desc">${f.desc}</div>
                    `;
                    cardsContainer.appendChild(cardEl);
                });
                genererRosterGraphique(true);
            } else {
                activerPhaseIAvsIA(cibleIA);
            }
        }
    }

    function choisirTransition(type) {
        if (type !== "centre" && energie < 1) return;
        
        transitionAttaque = type;
        document.querySelectorAll("#tactical-actions .action-tac-btn").forEach(b => b.classList.remove("selected-action"));
        
        if (type === "centre") document.getElementById("btn-t-centre").classList.add("selected-action");
        if (type === "rapide") document.getElementById("btn-t-rapide").classList.add("selected-action");
        if (type === "deplacement") document.getElementById("btn-t-deplacement").classList.add("selected-action");

        document.getElementById("log-text").innerHTML = `Transition validée. <br><br><strong>Étape 2 :</strong> Cliquez sur l'un de vos joueurs ci-dessus pour afficher ses techniques de frappe spécifiques.`;
        
        if (joueurSelectionne) regénérerCartesFrappes();
    }

    function regénérerCartesFrappes() {
        const container = document.getElementById("cards-container");
        container.innerHTML = "";
        let p = monEquipeJoueurs[joueurSelectionne];

        Object.keys(p.frappes).forEach(idFrappe => {
            let f = p.frappes[idFrappe];
            let coutGlobal = f.cout + (transitionAttaque !== "centre" ? 1 : 0);

            const cardEl = document.createElement("button");
            cardEl.className = "card attaque";
            cardEl.disabled = energie < coutGlobal;
            cardEl.onclick = () => executerAttaqueJoueur(idFrappe, coutGlobal);
            cardEl.innerHTML = `
                <div class="card-title">${f.nom}</div>
                <div class="card-cost">⚡ Cout: ${coutGlobal}</div>
                <div class="card-desc">${f.desc}</div>
            `;
            container.appendChild(cardEl);
        });
    }

    function executerAttaqueJoueur(idFrappe, coutGlobal) {
        const logText = document.getElementById("log-text");
        const btnContinuer = document.getElementById("btn-continuer");
        document.getElementById("tactical-actions").innerHTML = "";
        document.querySelectorAll('.card').forEach(c => c.disabled = true);
        
        let p = monEquipeJoueurs[joueurSelectionne];
        let frappe = p.frappes[idFrappe];
        energie -= coutGlobal;
        appliquerRecupFatigue(joueurSelectionne, true);
        actualiserScores();
        genererRosterGraphique(true);

        let cible = determinerCibleReglementaire(equipeJoueur);

        if (transitionAttaque === "deplacement" && formationIA === "rapproche") {
            logText.innerHTML = `❌ <strong>FAUTE DE CONTACT !</strong><br>Votre équipe a amorcé un déplacement latéral, mais l'équipe adverse s'était massée en <em>Bloc Rapproché</em>. Vos joueurs les percutent de plein fouet au moment de l'élan !<br><br>+1 point pour vos adversaires.`;
            attribuerPointsSauf(equipeJoueur);
            equipeQuiAttaque = cible;
            setTimeout(() => { btnContinuer.style.display = "inline-block"; }, 600);
            return;
        }

        if (idFrappe === "dunk" && formationIA !== "rapproche") {
            logText.innerHTML = `❌ <strong>FRAUPE DESCENDANTE !</strong><br><strong>${p.nom}</strong> a tenté un Dunk plongeant, mais la défense adverse était large et reculée. Le ballon est frappé directement vers le bas sans trajectoire ascendante règlementaire.<br><br>+1 point pour vos adversaires.`;
            attribuerPointsSauf(equipeJoueur);
            equipeQuiAttaque = cible;
            setTimeout(() => { btnContinuer.style.display = "inline-block"; }, 600);
            return;
        }

        let malusFatigue = p.endurance < 50 ? Math.round((50 - p.endurance) * 1.2) : 0;
        let jetAttaque = baseEquipeScore + (p[frappe.stat] * 0.6) - malusFatigue + (Math.random() * 30);
        let jetDefenseIA = 68 + (Math.random() * 30);

        if (transitionAttaque === "rapide") {
            jetAttaque += 20; 
        }
        if (transitionAttaque === "deplacement" && formationIA !== "rapproche") {
            jetDefenseIA -= 15;
        }

        if (idFrappe === "lob" && formationIA === "proche") jetAttaque += 25; 
        if (idFrappe === "feinte" && formationIA === "rapproche") jetAttaque += 25; 
        if (idFrappe === "dunk" && formationIA === "rapproche") jetAttaque += 35; 

        if (idFrappe === "frappe_lourde" && (p.endurance < 40 || Math.random() * 100 > 85)) {
            logText.innerHTML = `❌ <strong>BALLON DIRECTEMENT À L'EXTÉRIEUR !</strong><br>La trajectoire imprimée par <strong>${p.nom}</strong> est beaucoup trop lourde et puissante. Le ballon traverse tout le gymnase et sort des limites avant que quiconque puisse le toucher.<br><br>+1 point pour vos adversaires.`;
            attribuerPointsSauf(equipeJoueur);
            equipeQuiAttaque = cible;
        }
        else if (jetAttaque > jetDefenseIA) {
            logText.innerHTML = `💥 <strong>OMNIKIN ${cible} ! Points marqués !</strong><br>La tactique fonctionne à merveille : la technique <em>${frappe.nom}</em> de <strong>${p.nom}</strong> s'écrase au sol !`;
            attribuerPointsSauf(cible);
            equipeQuiAttaque = cible;
        } else {
            logText.innerHTML = `🛡️ <strong>Belle défense des ${cible} !</strong><br>Malgré votre préparation, leur bloc parvient à contrôler proprement la trajectoire de <strong>${p.nom}</strong>.`;
            equipeQuiAttaque = cible;
        }

        verifierReglesScores();
        setTimeout(() => { btnContinuer.style.display = "inline-block"; }, 600);
    }

    function executerDefenseJoueur(idForm, transitionIA) {
        const logText = document.getElementById("log-text");
        const btnContinuer = document.getElementById("btn-continuer");
        
        let formation = formationsDefensives[idForm];
        energie -= formation.cout;
        document.querySelectorAll('.card').forEach(c => c.disabled = true);

        let rand = Math.random() * 100;
        if (rand <= 35) joueurDefenseurCible = "paul";
        else if (rand <= 70) joueurDefenseurCible = "couille";
        else if (rand <= 85) joueurDefenseurCible = "pierre";
        else joueurDefenseurCible = "jacques";

        let p = monEquipeJoueurs[joueurDefenseurCible];
        appliquerRecupFatigue(joueurDefenseurCible, false);
        genererRosterGraphique(true); 

        if (transitionIA === "deplacement" && idForm === "rapproche") {
            logText.innerHTML = `L'IA s'est déplacée latéralement...<br>❌ <strong>FAUTE DE CONTACT DE VOTRE ÉQUIPE !</strong><br>Agrippés en <em>Bloc Rapproché</em>, vos joueurs n'ont pas pu esquiver le mouvement de l'attaquant. Les corps se percutent violemment avant la frappe.<br><br>+1 point pour vos adversaires.`;
            attribuerPointsSauf(equipeJoueur);
            equipeQuiAttaque = determinerCibleReglementaire(equipeJoueur);
            verifierReglesScores();
            btnContinuer.style.display = "inline-block";
            return;
        }

        let bonusDef = 0;
        if (typeFrappeIA === "lob" && idForm === "proche") bonusDef -= 35; 
        if (typeFrappeIA === "feinte" && idForm === "rapproche") bonusDef -= 30; 

        let malusFatigue = p.endurance < 50 ? Math.round((50 - p.endurance) * 1.2) : 0;
        let jetDef = baseEquipeScore + (p.vit * 0.6) + bonusDef - malusFatigue + (Math.random() * 30);
        let jetAttIA = 70 + (Math.random() * 30);

        if (transitionIA === "rapide") jetAttIA += 15; 

        setTimeout(() => {
            logText.innerHTML = `L'équipe adverse a déclenché une frappe de type : <strong>${typeFrappeIA.replace('_', ' ')}</strong>.<br>🎯 Le ballon plonge vers <strong>${p.nom}</strong> !<br><br>`;
            
            if (jetDef > jetAttIA) {
                logText.innerHTML += `🛡️ <strong>RÉCEPTION EXCELLENTE !</strong><br>${p.nom} maîtrise parfaitement le ballon au ras du sol. Vos partenaires stabilisent le cuir... <strong>C'est à vous d'attaquer !</strong>`;
                equipeQuiAttaque = equipeJoueur;
            } else {
                if (Math.random() * 100 > 70) {
                    logText.innerHTML += `❌ <strong>MAUVAIS CONTRÔLE : BALLON PROJETÉ À L'EXTÉRIEUR !</strong><br>${p.nom} touche le ballon en plongeant mais son geste n'est pas maîtrisé, envoyant la balle directement en dehors des limites du terrain.`;
                } else {
                    logText.innerHTML += `💥 <strong>BALLON AU SOL...</strong><br>${p.nom} est trop court pour glisser sous la trajectoire du ballon. Le point est perdu.`;
                }
                attribuerPointsSauf(equipeJoueur);
                equipeQuiAttaque = determinerCibleReglementaire(equipeJoueur);
            }

            verifierReglesScores();
            btnContinuer.style.display = "inline-block";
        }, 800);
    }

    function activerPhaseIAvsIA(cibleIA) {
        const logText = document.getElementById("log-text");
        const btnContinuer = document.getElementById("btn-continuer");
        
        logText.innerHTML = `L'équipe <strong>${equipeQuiAttaque}</strong> appelle : OMNIKIN <strong>${cibleIA}</strong> !`;
        btnContinuer.style.display = "inline-block";
        btnContinuer.disabled = true;
        btnContinuer.innerHTML = `IA joue<span class="loader"></span>`;

        setTimeout(() => {
            let de = Math.random() * 100;
            if (de > 52) { 
                logText.innerHTML = `<strong>Échange IA :</strong><br>💥 Le ballon touche le parquet chez les ${cibleIA} !`;
                attribuerPointsSauf(cibleIA);
                equipeQuiAttaque = cibleIA;
            } else {
                logText.innerHTML = `<strong>Échange IA :</strong><br>🛡️ Le ballon est bien relevé par l'équipe ${cibleIA}. Le jeu continue.`;
                equipeQuiAttaque = cibleIA;
            }
            verifierReglesScores();
            btnContinuer.disabled = false;
            btnContinuer.innerHTML = "Continuer ➔";
        }, 1100); 
    }

    function determinerCibleReglementaire(attaquant) {
        let ciblesPossibles = equipesEnJeu.filter(e => e !== attaquant);
        if (ciblesPossibles.length === 1) return ciblesPossibles[0];
        let scoreMax = -1; let ciblesFinales = [];
        ciblesPossibles.forEach(c => {
            if (scores[c] > scoreMax) { scoreMax = scores[c]; ciblesFinales = [c]; }
            else if (scores[c] === scoreMax) { ciblesFinales.push(c); }
        });
        return ciblesFinales[Math.floor(Math.random() * ciblesFinales.length)];
    }

    function attribuerPointsSauf(equipeFautive) {
        equipesEnJeu.forEach(couleur => {
            if (couleur !== equipeFautive) scores[couleur]++;
        });
    }

    function verifierReglesScores() {
        if (!phasePetiteFinale) {
            let equipeA9 = equipesEnJeu.find(e => scores[e] >= 9);
            if (equipeA9) {
                phasePetiteFinale = true;
                let pireScore = 999; let equipeEliminee = "";
                equipesEnJeu.forEach(e => {
                    if (scores[e] < pireScore) { pireScore = scores[e]; equipeEliminee = e; }
                });
                equipesEnJeu = equipesEnJeu.filter(e => e !== equipeEliminee);
                let deuxieme = equipesEnJeu[0]; let troisieme = equipesEnJeu[1];
                equipeQuiAttaque = scores[deuxieme] <= scores[troisieme] ? deuxieme : troisieme;
                alert(`🚨 EXCLUSION DES 9 POINTS ! L'équipe ${equipeEliminee} sort. Match à deux pour le dénouement !`);
            }
        } else {
            let gagnant = equipesEnJeu.find(e => scores[e] >= 11);
            if (gagnant) {
                alert(`🎉 PÉRIODE TERMINÉE ! Victoire des ${gagnant} avec ${scores[gagnant]} points !`);
                scores = { "BLEU": 0, "GRIS": 0, "NOIR": 0 };
                equipesEnJeu = ["BLEU", "GRIS", "NOIR"];
                phasePetiteFinale = false;
                equipeQuiAttaque = "BLEU";
                Object.keys(monEquipeJoueurs).forEach(id => monEquipeJoueurs[id].endurance = 100);
            }
        }
        actualiserScores();
    }

    function actualiserScores() {
        document.getElementById("scores").innerText = `BLEU: ${scores["BLEU"]} | GRIS: ${scores["GRIS"]} | NOIR: ${scores["NOIR"]}`;
        document.getElementById("energie").innerText = `⚡ Énergie globale: ${energie}/4`;
    }

    function confirmerContinuer() {
        determinerPhase();
    }
</script>
